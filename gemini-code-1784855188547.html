<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>편의점 길찾기 & 재고 도우미</title>
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --font-size-base: 16px;
            --primary-color: #ff6b6b;
            --bg-color: #f8f9fa;
        }

        body {
            font-size: var(--font-size-base);
            font-family: 'Apple SD Gothic Neo', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        header {
            background: #fff;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: inherit;
            box-sizing: border-box;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            opacity: 0.9;
        }

        #map {
            width: 100%;
            height: 400px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .result-box {
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            white-space: pre-wrap;
        }

        /* Dynamic Logo Scaling simulation via Leaflet custom zoom handling or CSS */
        .store-logo-icon {
            background: white;
            border: 2px solid #333;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">편의점 스마트 길찾기 & 재고 서비스</h1>
    </header>

    <div class="container">
        <!-- Step 1: Age Verification (Accessibility) -->
        <div class="card" id="age-section">
            <h3>환영합니다! 원활한 서비스 이용을 위해 나이를 입력해주세요.</h3>
            <label for="user-age">나이 입력</label>
            <input type="number" id="user-age" placeholder="예: 30 또는 50" />
            <button onclick="setAge()">시작하기</button>
        </div>

        <!-- Step 2: Main Application Interface (Hidden initially) -->
        <div class="card" id="main-app" style="display: none;">
            <h3>현재 위치 및 조건 설정</h3>
            
            <label for="current-location">현재 위치 (주소 또는 건물명)</label>
            <input type="text" id="current-location" placeholder="예: 서울시 강남구 테헤란로 123" />

            <label for="transport-mode">이동 수단 (경로 카테고리)</label>
            <select id="transport-mode">
                <option value="walk_bike">자전거 / 걷기 (인도 중심 최적화)</option>
                <option value="car">자동차 (도로 중심 최적화)</option>
            </select>

            <label for="item-category">물건 분류 카테고리</label>
            <select id="item-category">
                <option value="간편식품">간편식품 (도시락, 삼각김밥 등)</option>
                <option value="음료/디저트">음료/디저트</option>
                <option value="안전상비의약품">안전상비의약품 (소화제, 해열제 등)</option>
                <option value="직접입력">직접 입력하기</option>
            </select>

            <div id="custom-item-box" style="display:none;">
                <label for="custom-item-input">찾으시는 물건 이름</label>
                <input type="text" id="custom-item-input" placeholder="예: 특정 숙취해소제" />
            </div>

            <label>
                <input type="checkbox" id="filter-24h" style="width:auto; margin-right:10px;"> 이마트24 및 24시 영업점 우선 표시
            </label>

            <button onclick="findStoreAndInventory()">AI로 최적 경로 및 재고/행사 조회하기</button>
        </div>

        <!-- Results & Map Section -->
        <div class="card" id="result-section" style="display: none;">
            <h3>AI 분석 결과 (경로, 로또, 1+1 행사, 콜라보, 배달 여부)</h3>
            <div id="map"></div>
            <div id="ai-result" class="result-box">결과를 불러오는 중입니다...</div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let userAge = 25;
        let map, currentZoom = 13;

        // Age Setup & Font Scaling (>= 45 gets 1.5x font size)
        function setAge() {
            const ageInput = document.getElementById('user-age').value;
            if (!ageInput) {
                alert('나이를 입력해주세요.');
                return;
            }
            userAge = parseInt(ageInput, 10);
            
            if (userAge >= 45) {
                document.documentElement.style.setProperty('--font-size-base', '24px');
            } else {
                document.documentElement.style.setProperty('--font-size-base', '16px');
            }

            document.getElementById('age-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initMap(37.5665, 126.9780); // Default Seoul center
        }

        // Item category custom view toggle
        document.getElementById('item-category').addEventListener('change', function() {
            const customBox = document.getElementById('custom-item-box');
            if (this.value === '직접입력') {
                customBox.style.display = 'block';
            } else {
                customBox.style.display = 'none';
            }
        });

        function initMap(lat, lng) {
            map = L.map('map').setView([lat, lng], currentZoom);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            // Dynamic Logo Scaling based on map zoom level
            map.on('zoomend', function() {
                currentZoom = map.getZoom();
                updateMarkerSizes();
            });
        }

        let markers = [];
        function updateMarkerSizes() {
            // As map zooms out (smaller zoom number), scale logos up/down accordingly relative to zoom
            let size = Math.max(20, currentZoom * 3); 
            markers.forEach(marker => {
                let el = marker.getElement();
                if(el) {
                    el.style.width = size + 'px';
                    el.style.height = size + 'px';
                    el.style.fontSize = (size / 3) + 'px';
                }
            });
        }

        async function findStoreAndInventory() {
            const location = document.getElementById('current-location').value;
            const transport = document.getElementById('transport-mode').value;
            const category = document.getElementById('item-category').value;
            const customItem = document.getElementById('custom-item-input').value;
            const filter24h = document.getElementById('filter-24h').checked;

            if (!location) {
                alert('현재 위치를 적어주세요.');
                return;
            }

            document.getElementById('result-section').style.display = 'block';
            document.getElementById('ai-result').innerText = 'AI가 가장 가까운 편의점 경로, 재고 공식 사이트 링크, 행사 정보 등을 분석 중입니다...';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location, transport, category, customItem, filter24h })
                });

                const data = await response.json();
                if(data.error) {
                    document.getElementById('ai-result').innerText = '오류 발생: ' + data.error;
                    return;
                }

                document.getElementById('ai-result').innerHTML = data.text;

                // Clear previous markers
                markers.forEach(m => map.removeLayer(m));
                markers = [];

                // Example mock coordinates placement based on search (or simulated nearby spots)
                let stores = [
                    { name: 'CU 강남점', lat: 37.4979, lng: 127.0276, brand: 'CU' },
                    { name: 'GS25 역삼점', lat: 37.5000, lng: 127.0365, brand: 'GS25' },
                    { name: '이마트24 시티점', lat: 37.4960, lng: 127.0300, brand: 'EMART24' }
                ];

                stores.forEach(store => {
                    let size = Math.max(20, currentZoom * 3);
                    let customIcon = L.divIcon({
                        className: 'store-logo-icon',
                        html: `<b>${store.brand}</b>`,
                        iconSize: [size, size]
                    });
                    let marker = L.marker([store.lat, store.lng], { icon: customIcon }).addTo(map)
                        .bindPopup(`<b>${store.name}</b><br>재고 확인 및 행사 정보 확인 가능`);
                    markers.push(marker);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('ai-result').innerText = '서버 통신 중 오류가 발생했습니다.';
            }
        }
    </script>
</body>
</html>
