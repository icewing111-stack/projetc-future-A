<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>편의점 지도 & 재고 조회</title>
    <!-- Leaflet CSS (OpenStreetMap을 위한 무료 지도 라이브러리) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --font-size-base: 1rem;
            --btn-padding: 10px 20px;
        }

        body.large-font {
            --font-size-base: 1.5rem;
            --btn-padding: 15px 30px;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            font-size: var(--font-size-base);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: calc(var(--font-size-base) * 1.5);
            text-align: center;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, button {
            width: 100%;
            padding: var(--btn-padding);
            font-size: var(--font-size-base);
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #map {
            width: 100%;
            height: 350px;
            margin-top: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        #result {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 4px;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- 나이 입력 모달/화면 -->
    <div id="age-modal" class="container">
        <h2>환영합니다! 편의점 지도 서비스</h2>
        <div class="input-group">
            <label for="age-input">나이를 입력해주세요:</label>
            <input type="number" id="age-input" placeholder="예: 30" min="1" max="120">
        </div>
        <button onclick="setAge()">시작하기</button>
    </div>

    <!-- 메인 앱 화면 -->
    <div id="app-container" class="container hidden">
        <h2>편의점 지도 및 재고 조회</h2>
        <div class="input-group">
            <label for="location-input">현재 위치를 입력해주세요 (예: 서울시 강남구 역삼동):</label>
            <input type="text" id="location-input" placeholder="예: 서울시 중구 명동길 14">
        </div>
        <button onclick="findStoreAndMap()">가장 가까운 편의점 찾기 및 지도 보기</button>
        
        <!-- 지도 영역 -->
        <div id="map"></div>

        <div id="loading" class="hidden" style="text-align: center; margin-top: 15px;">AI가 최적의 경로와 브랜드 재고를 확인하는 중입니다...</div>
        <div id="result"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        let map = null;
        let marker = null;

        function setAge() {
            const ageInput = document.getElementById('age-input').value;
            const age = parseInt(ageInput, 10);

            if (isNaN(age) || age <= 0) {
                alert('올바른 나이를 입력해주세요.');
                return;
            }

            // 45세 이상인 경우 폰트 크기 1.5배 적용
            if (age >= 45) {
                document.body.classList.add('large-font');
            }

            // 화면 전환
            document.getElementById('age-modal').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');

            // 지도 초기화 (기본 서울 시청 좌표)
            setTimeout(() => {
                map = L.map('map').setView([37.5666, 126.9784], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);
            }, 200);
        }

        async function findStoreAndMap() {
            const location = document.getElementById('location-input').value;
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');

            if (!location.trim()) {
                alert('현재 위치를 입력해주세요.');
                return;
            }

            resultDiv.innerText = '';
            loadingDiv.classList.remove('hidden');

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ location })
                });

                const data = await response.json();
                loadingDiv.classList.add('hidden');

                if (response.ok) {
                    resultDiv.innerText = data.result;

                    // Nominatim API를 이용해 입력된 주소의 위도/경도 검색 후 지도 이동
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
                    const geoData = await geoRes.json();

                    if (geoData && geoData.length > 0) {
                        const lat = parseFloat(geoData[0].lat);
                        const lon = parseFloat(geoData[0].lon);

                        map.setView([lat, lon], 16);
                        if (marker) {
                            map.removeLayer(marker);
                        }
                        marker = L.marker([lat, lon]).addTo(map)
                            .bindPopup(`<b>현재 위치</b><br>${location}`).openPopup();
                    }
                } else {
                    resultDiv.innerText = `오류 발생: ${data.error || '알 수 없는 오류'}`;
                }
            } catch (error) {
                loadingDiv.classList.add('hidden');
                resultDiv.innerText = `통신 오류 발생: ${error.message}`;
            }
        }
    </script>
</body>
</html>
