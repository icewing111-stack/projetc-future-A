<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>편의점 스마트 지도 & 재고 조회</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --font-size-base: 1rem;
            --btn-padding: 10px 20px;
        }

        body.large-font {
            --font-size-base: 1.5rem;
            --btn-padding: 15px 30px;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
            font-size: var(--font-size-base);
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: calc(var(--font-size-base) * 1.5);
            text-align: center;
            color: #2c3e50;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, button {
            width: 100%;
            padding: var(--btn-padding);
            font-size: var(--font-size-base);
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-top: 5px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #map {
            width: 100%;
            height: 400px;
            margin-top: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        #result {
            margin-top: 20px;
            white-space: pre-wrap;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 4px;
            line-height: 1.6;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- 초기 설정 화면 (나이 및 경로 색상 선택) -->
    <div id="setup-modal" class="container">
        <h2>환영합니다! 편의점 스마트 지도</h2>
        <div class="input-group">
            <label for="age-input">나이를 입력해주세요:</label>
            <input type="number" id="age-input" placeholder="예: 30" min="1" max="120" value="30">
        </div>
        <div class="input-group">
            <label for="color-input">이동 경로 색상을 선택해주세요:</label>
            <select id="color-input">
                <option value="blue">파란색</option>
                <option value="red">빨간색</option>
                <option value="green">초록색</option>
                <option value="purple">보라색</option>
                <option value="orange">주황색</option>
            </select>
        </div>
        <button onclick="completeSetup()">시작하기</button>
    </div>

    <!-- 메인 앱 화면 -->
    <div id="app-container" class="container hidden">
        <h2>편의점 지도 및 재고 조회</h2>
        <div class="input-group">
            <label for="location-input">현재 위치를 입력해주세요:</label>
            <input type="text" id="location-input" placeholder="예: 서울시 강남구 역삼동">
        </div>
        <button onclick="findStoreAndMap()">가장 가까운 편의점 찾기 및 이동</button>
        
        <!-- 지도 영역 -->
        <div id="map"></div>

        <div id="result"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        let map = null;
        let userMarker = null;
        let storeMarkers = [];
        let routeLine = null;
        let userRouteColor = 'blue';

        function completeSetup() {
            const ageInput = document.getElementById('age-input').value;
            const age = parseInt(ageInput, 10);
            userRouteColor = document.getElementById('color-input').value;

            if (isNaN(age) || age <= 0) {
                alert('올바른 나이를 입력해주세요.');
                return;
            }

            if (age >= 45) {
                document.body.classList.add('large-font');
            }

            document.getElementById('setup-modal').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');

            setTimeout(() => {
                map = L.map('map').setView([37.5666, 126.9784], 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);

                updateUserPosition(37.5666, 126.9784);
            }, 200);
        }

        function createArrowIcon() {
            return L.divIcon({
                className: 'custom-arrow-icon',
                html: `<div style="font-size: 28px; text-shadow: 0 0 3px white;">🔺</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });
        }

        function createStoreIcon(brand) {
            let bg = '#333';
            let text = '편의점';
            if(brand.includes('CU')) { bg = '#6A0DAD'; text = 'CU'; }
            else if(brand.includes('GS25')) { bg = '#0066CC'; text = 'GS25'; }
            else if(brand.includes('세븐일레븐')) { bg = '#FF6600'; text = '7-11'; }
            else if(brand.includes('이마트24')) { bg = '#FFCC00'; text = 'e24'; }

            return L.divIcon({
                className: 'custom-store-icon',
                html: `<div style="background-color: ${bg}; color: white; padding: 6px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 2px solid white;">${text}</div>`,
                iconSize: [60, 35],
                iconAnchor: [30, 17]
            });
        }

        function updateUserPosition(lat, lon) {
            if (!map) return;
            if (userMarker) {
                map.removeLayer(userMarker);
            }
            userMarker = L.marker([lat, lon], { icon: createArrowIcon() }).addTo(map)
                .bindPopup('<b>내 위치 (실시간 이동)</b>');
        }

        async function findStoreAndMap() {
            const location = document.getElementById('location-input').value;
            const resultDiv = document.getElementById('result');

            if (!location.trim()) {
                alert('현재 위치를 입력해주세요.');
                return;
            }

            resultDiv.innerText = '위치를 검색하고 최적 경로와 재고를 분석하는 중...';

            try {
                // 오픈 소스 지오코딩 API(Nominatim) 이용 (키 불필요)
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(location)}`);
                const geoData = await geoRes.json();

                if (geoData && geoData.length > 0) {
                    const userLat = parseFloat(geoData[0].lat);
                    const userLon = parseFloat(geoData[0].lon);

                    map.setView([userLat, userLon], 16);
                    updateUserPosition(userLat, userLon);

                    storeMarkers.forEach(m => map.removeLayer(m));
                    storeMarkers = [];
                    if (routeLine) {
                        map.removeLayer(routeLine);
                    }

                    const nearbyStores = [
                        { name: 'CU 역삼점', lat: userLat + 0.0012, lon: userLon + 0.0010, stock: '삼각김밥 3개, 생수 여유' },
                        { name: 'GS25 강남중앙점', lat: userLat - 0.0015, lon: userLon + 0.0018, stock: '도시락 2개, 상비약 있음' },
                        { name: '세븐일레븐 역삼역점', lat: userLat + 0.0008, lon: userLon - 0.0015, stock: '음료수 풍부' }
                    ];

                    nearbyStores.forEach((store) => {
                        const marker = L.marker([store.lat, store.lon], { icon: createStoreIcon(store.name) })
                            .addTo(map)
                            .bindPopup(`<b>${store.name}</b><br>재고: ${store.stock}`);
                        storeMarkers.push(marker);
                    });

                    const nearestStore = nearbyStores[0];
                    const routeCoords = [
                        [userLat, userLon],
                        [userLat + 0.0005, userLon + 0.0005],
                        [nearestStore.lat, nearestStore.lon]
                    ];
                    routeLine = L.polyline(routeCoords, { color: userRouteColor, weight: 6, opacity: 0.85 }).addTo(map);

                    resultDiv.innerText = `[안내 완료]\n- 검색 위치: ${location}\n- 가장 가까운 편의점: ${nearestStore.name}\n- 실시간 재고 상태: ${nearestStore.stock}\n- 선택하신 색상(${userRouteColor})으로 경로가 표시되었습니다.`;
                } else {
                    resultDiv.innerText = '해당 위치를 찾을 수 없습니다. 올바른 주소(예: 서울시 강남구 역삼동)를 입력해주세요.';
                }
            } catch (error) {
                resultDiv.innerText = `오류 발생: ${error.message}`;
            }
        }
    </script>
</body>
</html>
