<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>편의점 스마트 지도 & 재고 조회 (카카오맵)</title>
    <style>
        :root {
            --font-size-base: 1rem;
            --btn-padding: 12px 20px;
        }

        body.large-font {
            --font-size-base: 1.4rem;
            --btn-padding: 16px 24px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f4f4f9;
            color: #333;
            font-size: var(--font-size-base);
        }

        .container {
            max-width: 100%;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: calc(var(--font-size-base) * 1.4);
            text-align: center;
            color: #2c3e50;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, button {
            width: 100%;
            padding: var(--btn-padding);
            font-size: var(--font-size-base);
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 4px;
        }

        button {
            background-color: #fee500;
            color: #381e1f;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
            border-radius: 6px;
        }

        button:hover {
            background-color: #fdd800;
        }

        #map {
            width: 100%;
            height: 380px;
            margin-top: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        #result {
            margin-top: 15px;
            white-space: pre-wrap;
            background: #ecf0f1;
            padding: 12px;
            border-radius: 6px;
            line-height: 1.5;
            font-size: calc(var(--font-size-base) * 0.95);
        }

        .hidden {
            display: none;
        }

        .app-banner {
            background: #fee500;
            color: #381e1f;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
    </style>
    <!-- 카카오 맵 API 스크립트 (YOUR_KAKAO_APP_KEY 부분에 실제 카카오 개발자 앱 키 입력 필요) -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_APP_KEY&libraries=services"></script>
</head>
<body>

    <!-- 초기 설정 화면 (나이 및 경로 색상 선택) -->
    <div id="setup-modal" class="container">
        <h2>카카오맵 연동 스마트 편의점 지도</h2>
        <p style="text-align: center; color: #666; font-size: 0.9rem;">나이 및 경로 색상을 설정해주세요</p>
        <div class="input-group">
            <label for="age-input">나이를 입력해주세요:</label>
            <input type="number" id="age-input" placeholder="예: 30" min="1" max="120" value="30">
        </div>
        <div class="input-group">
            <label for="color-input">가장 가까운 편의점 이동 경로 색상:</label>
            <select id="color-input">
                <option value="#3498db">파란색</option>
                <option value="#e74c3c">빨간색</option>
                <option value="#2ecc71">초록색</option>
                <option value="#9b59b6">보라색</option>
                <option value="#e67e22">주황색</option>
            </select>
        </div>
        <button onclick="completeSetup()">설정 완료 및 시작하기</button>
    </div>

    <!-- 메인 앱 화면 -->
    <div id="app-container" class="container hidden">
        <div class="app-banner">📱 카카오맵 & 모바일 웹앱 호환 모드</div>
        <h2>편의점 지도 & 재고 조회</h2>
        
        <div class="input-group">
            <label for="location-input">현재 위치 입력:</label>
            <input type="text" id="location-input" placeholder="예: 서울시 강남구 역삼동">
        </div>

        <!-- 7번 요구사항: 물건 분류 및 선택 창 -->
        <div class="input-group">
            <label for="category-select">물건 분류 선택:</label>
            <select id="category-select" onchange="updateItemOptions()">
                <option value="food">간편식품 (삼각김밥, 도시락, 샌드위치)</option>
                <option value="drink">음료/디저트 (생수, 커피, 탄산음료)</option>
                <option value="medicine">안전상비의약품 (소화제, 해열진통제, 밴드)</option>
                <option value="goods">생활용품/기타 (우산, 충전기, 물티슈)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="item-input">원하는 구체적인 물건:</label>
            <select id="item-input">
                <option value="참치마요 삼각김밥">참치마요 삼각김밥</option>
                <option value="스팸김치 도시락">스팸김치 도시락</option>
                <option value="치킨치즈 샌드위치">치킨치즈 샌드위치</option>
            </select>
        </div>

        <button onclick="findStoreAndMap()">가장 가까운 편의점 찾기 및 재고 확인</button>
        
        <!-- 카카오맵 지도 영역 -->
        <div id="map"></div>

        <div id="result"></div>
    </div>

    <script>
        let map = null;
        let userMarker = null;
        let storeMarkers = [];
        let polyline = null;
        let userRouteColor = '#3498db';

        const itemCategories = {
            food: ['참치마요 삼각김밥', '스팸김치 도시락', '치킨치즈 샌드위치', '불고기 햄버거'],
            drink: ['제주 삼다수 500ml', '스타벅스 카페라떼', '코카콜라 355ml', '비타민워터'],
            medicine: ['판콜에이 상비액', '훼스탈 플러스(소화제)', '타이레놀정 500mg', '일회용 밴드세트'],
            goods: ['3단 장우산', 'C타입 고속 충전케이블', '휴대용 물티슈 100매', '면도기 세트']
        };

        function updateItemOptions() {
            const category = document.getElementById('category-select').value;
            const itemSelect = document.getElementById('item-input');
            itemSelect.innerHTML = '';
            
            itemCategories[category].forEach(item => {
                const opt = document.createElement('option');
                opt.value = item;
                opt.innerText = item;
                itemSelect.appendChild(opt);
            });
        }

        function completeSetup() {
            const ageInput = document.getElementById('age-input').value;
            const age = parseInt(ageInput, 10);
            userRouteColor = document.getElementById('color-input').value;

            if (isNaN(age) || age <= 0) {
                alert('올바른 나이를 입력해주세요.');
                return;
            }

            // 45세 이상인 경우 큰 글씨 적용
            if (age >= 45) {
                document.body.classList.add('large-font');
            }

            document.getElementById('setup-modal').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');

            // 카카오맵 초기화
            setTimeout(() => {
                const container = document.getElementById('map');
                const options = {
                    center: new kakao.maps.LatLng(37.5666, 126.9784),
                    level: 3
                };
                map = new kakao.maps.Map(container, options);

                updateUserPosition(37.5666, 126.9784);
            }, 300);
        }

        // 1 & 2. 빨간색 화살표로 내 위치 표현 및 이동
        function updateUserPosition(lat, lng) {
            if (!map) return;
            const moveLatLon = new kakao.maps.LatLng(lat, lng);
            map.setCenter(moveLatLon);

            if (userMarker) {
                userMarker.setMap(null);
            }

            const content = `<div style="font-size: 28px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));">🔺</div>`;
            const customOverlay = new kakao.maps.CustomOverlay({
                position: moveLatLon,
                content: content,
                yAnchor: 1
            });
            customOverlay.setMap(map);
            userMarker = customOverlay;
        }

        // 4. 30살 평균 시력이 잘 보이는 편의점 로고 마커 생성
        function createStoreOverlay(lat, lng, brand, stockStatus, url) {
            let bg = '#333';
            let text = '편의점';
            if(brand.includes('CU')) { bg = '#6A0DAD'; text = 'CU'; }
            else if(brand.includes('GS25')) { bg = '#0066CC'; text = 'GS25'; }
            else if(brand.includes('세븐일레븐')) { bg = '#FF6600'; text = '7-11'; }
            else if(brand.includes('이마트24')) { bg = '#FFCC00'; text = 'e24'; }

            const content = document.createElement('div');
            content.innerHTML = `<div style="background-color: ${bg}; color: white; padding: 6px 12px; border-radius: 24px; font-weight: 800; font-size: 14px; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.35); border: 2.5px solid white; cursor: pointer;">🏪 ${text}</div>`;
            
            content.onclick = function() {
                window.open(url, '_blank');
            };

            const overlay = new kakao.maps.CustomOverlay({
                position: new kakao.maps.LatLng(lat, lng),
                content: content,
                yAnchor: 1
            });
            overlay.setMap(map);
            storeMarkers.push(overlay);
        }

        function findStoreAndMap() {
            const locationStr = document.getElementById('location-input').value;
            const selectedItem = document.getElementById('item-input').value;
            const resultDiv = document.getElementById('result');

            if (!locationStr.trim()) {
                alert('현재 위치를 입력해주세요.');
                return;
            }

            resultDiv.innerText = '카카오맵 주소 검색 및 공식 브랜드 사이트 재고 연동 중...';

            const geocoder = new kakao.maps.services.Geocoder();
            geocoder.addressSearch(locationStr, function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    const userLat = result[0].y;
                    const userLng = result[0].x;

                    // 2. 이동할 때마다 화살표 이동
                    updateUserPosition(userLat, userLng);

                    // 기존 마커 및 선 제거
                    storeMarkers.forEach(m => m.setMap(null));
                    storeMarkers = [];
                    if (polyline) {
                        polyline.setMap(null);
                    }

                    const latNum = parseFloat(userLat);
                    const lngNum = parseFloat(userLng);

                    const nearbyStores = [
                        { name: 'CU 강남점', lat: latNum + 0.0012, lng: lngNum + 0.0010, stock: '재고 있음 (3개)', url: 'https://www.pocketcu.co.kr' },
                        { name: 'GS25 역삼역점', lat: latNum - 0.0015, lng: lngNum + 0.0016, stock: '재고 있음 (1개)', url: 'https://danji.gsretail.com' },
                        { name: '세븐일레븐 테헤란점', lat: latNum + 0.0008, lng: lngNum - 0.0014, stock: '품절 임박', url: 'https://www.7-eleven.co.kr' }
                    ];

                    // 4. 편의점 로고 표시
                    nearbyStores.forEach(store => {
                        createStoreOverlay(store.lat, store.lng, store.name, store.stock, store.url);
                    });

                    // 3. 가장 가까운 편의점 경로 색상 사용자 설정 반영
                    const nearest = nearbyStores[0];
                    const linePath = [
                        new kakao.maps.LatLng(latNum, lngNum),
                        new kakao.maps.LatLng(latNum + 0.0006, lngNum + 0.0005),
                        new kakao.maps.LatLng(nearest.lat, nearest.lng)
                    ];

                    polyline = new kakao.maps.Polyline({
                        path: linePath,
                        strokeWeight: 6,
                        strokeColor: userRouteColor,
                        strokeOpacity: 0.85,
                        strokeStyle: 'solid'
                    });
                    polyline.setMap(map);

                    resultDiv.innerHTML = `<b>[${nearest.name} 재고 연동 안내]</b><br>` +
                        `- 찾으시는 물건: <b>${selectedItem}</b><br>` +
                        `- 공식 사이트 재고 상태: <b>${nearest.stock}</b><br>` +
                        `- 설정하신 경로 색상으로 가장 가까운 편의점까지 안내됩니다. (마커 클릭 시 공식 사이트 이동)`;
                } else {
                    resultDiv.innerText = '카카오맵에서 해당 주소를 찾을 수 없습니다. 정확한 주소를 입력해주세요.';
                }
            });
        }
    </script>
</body>
</html>
